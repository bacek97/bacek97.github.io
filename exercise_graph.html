<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Упражнений (WebGL)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/force-graph"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0c29;
            overflow: hidden;
        }

        #graph {
            width: 100vw;
            height: 100vh;
        }

        #legend {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 70vh;
            overflow-y: auto;
            min-width: 180px;
        }

        #legend h3 {
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .legend-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .legend-item.active {
            background: rgba(255, 255, 255, 0.2);
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .legend-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
        }

        .legend-count {
            margin-left: auto;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }

        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 220px;
        }

        #controls input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 13px;
            outline: none;
        }

        #controls input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #controls input[type="text"]:focus {
            border-color: rgba(100, 150, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            accent-color: #6C5CE7;
            cursor: pointer;
        }

        #exercise-count {
            margin-top: 12px;
            padding: 8px 12px;
            background: rgba(100, 150, 255, 0.15);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            text-align: center;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 1000;
            background: rgba(20, 20, 40, 0.9);
            padding: 20px 40px;
            border-radius: 12px;
        }

        #tooltip {
            position: fixed;
            padding: 15px;
            background: rgba(30, 30, 50, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 13px;
            pointer-events: none;
            z-index: 1000;
            max-width: 350px;
            display: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        #tooltip h4 {
            margin-bottom: 8px;
            font-size: 15px;
        }

        #tooltip .equipment {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }

        #tooltip .muscles {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 10px;
        }

        #tooltip .muscle-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            color: white;
        }

        #tooltip video,
        #tooltip img {
            width: 100%;
            border-radius: 8px;
            margin-top: 8px;
            max-height: 200px;
            object-fit: cover;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div id="graph"></div>

    <div id="legend">
        <h3>🎯 Группы мышц</h3>
        <div id="legend-items"></div>
    </div>

    <div id="controls">
        <input type="text" id="search" placeholder="🔍 Поиск упражнения...">
        <label class="checkbox-label">
            <input type="checkbox" id="bodyweight-only">
            <span>Только с собственным весом</span>
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="video-only" checked>
            <span>Только с видео</span>
        </label>
        <div id="exercise-count">🏋️ 0 упражнений</div>
    </div>

    <div class="loading" id="loading">⏳ Загрузка данных...</div>
    <div id="tooltip"></div>

    <script>
        // Цвета для групп мышц
        const muscleColors = {
            'Biceps': '#FF6B6B',
            'Triceps': '#4ECDC4',
            'Chest': '#FF8E53',
            'Shoulders': '#A8E6CF',
            'Upper Back': '#6C5CE7',
            'Lats': '#00B894',
            'Lower Back': '#FDCB6E',
            'Quadriceps': '#E17055',
            'Hamstrings': '#D63031',
            'Glutes': '#E84393',
            'Calves': '#00CEC9',
            'Abdominals': '#FAB1A0',
            'Forearms': '#74B9FF',
            'Traps': '#A29BFE',
            'Full Body': '#FD79A8',
            'Cardio': '#55EFC4',
            'Neck': '#81ECEC',
            'Adductors': '#DFE6E9',
            'Abductors': '#B2BEC3',
            'Deltoids': '#A8E6CF',
            'Other': '#636E72'
        };

        // Маппинг названий мышц
        const muscleNameMap = {
            'latissimus_dorsi': 'Lats',
            'trapezius': 'Traps',
            'trapezius_lower_fibers': 'Traps',
            'trapezius_middle_fibers': 'Traps',
            'trapezius_upper_fibers': 'Traps',
            'traps': 'Traps',
            'biceps': 'Biceps',
            'triceps': 'Triceps',
            'quadriceps': 'Quadriceps',
            'hamstrings': 'Hamstrings',
            'gluteus_maximus': 'Glutes',
            'gastrocnemius': 'Calves',
            'soleus': 'Calves',
            'rectus_abdominis': 'Abdominals',
            'obliques': 'Abdominals',
            'deltoid_anterior': 'Shoulders',
            'deltoid_lateral': 'Shoulders',
            'deltoid_posterior': 'Shoulders',
            'deltoids': 'Shoulders',
            'chest_clavicular_head': 'Chest',
            'pectoralis': 'Chest',
            'infraspinatus': 'Upper Back',
            'teres_major': 'Upper Back',
            'teres_minor': 'Upper Back',
            'rhomboids': 'Upper Back',
            'brachialis': 'Biceps',
            'brachioradialis': 'Forearms',
            'wrist_flexors': 'Forearms',
            'wrist_extensors': 'Forearms',
            'hip_adductors': 'Adductors',
            'hip_abductors': 'Abductors',
            'tensor_fasciae_femoris': 'Glutes',
            'iliopsoas': 'Abdominals',
            'serratus_anterior': 'Chest',
            'sartorius': 'Quadriceps'
        };

        function normalizeMuscle(muscle) {
            if (!muscle || muscle === 'None') return null;
            const trimmed = muscle.trim().toLowerCase().replace(/_/g, ' ');

            // Точное совпадение в маппинге
            if (muscleNameMap[trimmed.replace(/ /g, '_')]) return muscleNameMap[trimmed.replace(/ /g, '_')];
            if (muscleNameMap[trimmed]) return muscleNameMap[trimmed];

            // Проверяем ключевые слова для групп мышц
            if (trimmed.includes('trapez') || trimmed.includes('trap')) return 'Traps';
            if (trimmed.includes('latissimus') || trimmed === 'lats') return 'Lats';
            if (trimmed.includes('deltoid') || trimmed.includes('shoulder')) return 'Shoulders';
            if (trimmed.includes('pector') || trimmed.includes('chest')) return 'Chest';
            if (trimmed.includes('bicep') || trimmed.includes('brachialis')) return 'Biceps';
            if (trimmed.includes('tricep')) return 'Triceps';
            if (trimmed.includes('quadricep') || trimmed.includes('quad')) return 'Quadriceps';
            if (trimmed.includes('hamstring')) return 'Hamstrings';
            if (trimmed.includes('glute') || trimmed.includes('gluteus')) return 'Glutes';
            if (trimmed.includes('calf') || trimmed.includes('gastrocnemius') || trimmed.includes('soleus')) return 'Calves';
            if (trimmed.includes('abdomin') || trimmed.includes('oblique') || trimmed.includes('rectus')) return 'Abdominals';
            if (trimmed.includes('forearm') || trimmed.includes('wrist') || trimmed.includes('brachioradialis')) return 'Forearms';
            if (trimmed.includes('rhomboid') || trimmed.includes('infraspinatus') || trimmed.includes('teres')) return 'Upper Back';
            if (trimmed.includes('lower back') || trimmed.includes('erector')) return 'Lower Back';
            if (trimmed.includes('adduct')) return 'Adductors';
            if (trimmed.includes('abduct')) return 'Abductors';
            if (trimmed.includes('neck')) return 'Neck';

            // Проверяем точные совпадения с ключами muscleColors
            for (const key of Object.keys(muscleColors)) {
                if (key.toLowerCase() === trimmed) return key;
            }

            // Частичное совпадение с ключами muscleColors
            for (const key of Object.keys(muscleColors)) {
                if (trimmed.includes(key.toLowerCase()) || key.toLowerCase().includes(trimmed)) return key;
            }

            return 'Other';
        }

        function getMuscleColor(muscle) {
            if (!muscle || muscle === 'None') return muscleColors['Other'];
            const normalized = normalizeMuscle(muscle);
            return muscleColors[normalized] || muscleColors['Other'];
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 100, g: 100, b: 100 };
        }

        // CSV парсинг
        async function loadData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/aree6/LiftShift/refs/heads/main/frontend/public/exercises_muscles_and_thumbnail_data.csv');
                const text = await response.text();
                return parseCSV(text);
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                return [];
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                else current += char;
            }
            result.push(current.trim());
            return result;
        }

        function parseCSV(text) {
            const lines = text.split('\n');
            const exercises = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const row = parseCSVLine(line);
                if (row.length >= 2 && row[0]) {
                    exercises.push({
                        name: row[0] || '',
                        equipment: row[1] || '',
                        primary_muscle: row[2] || '',
                        secondary_muscle: row[3] || '',
                        video: row[4] || '',
                        thumbnail: row[5] || ''
                    });
                }
            }
            return exercises;
        }

        function filterExercises(exercises, bodyweightOnly, videoOnly) {
            let result = exercises;
            if (bodyweightOnly) {
                result = result.filter(ex => {
                    const eq = (ex.equipment || '').toLowerCase().trim();
                    return eq === 'none' || eq === '' || eq === 'body weight';
                });
            }
            if (videoOnly) {
                result = result.filter(ex => {
                    const v = (ex.video || '').trim();
                    return v && v !== 'None' && v !== '';
                });
            }
            return result;
        }

        function getPrimaryMuscle(ex) {
            if (!ex.primary_muscle || ex.primary_muscle === 'None') return 'Other';
            const muscles = ex.primary_muscle.split(',').map(m => normalizeMuscle(m.trim())).filter(m => m);
            return muscles[0] || 'Other';
        }

        function getAllMuscles(ex) {
            const muscles = new Set();
            if (ex.primary_muscle && ex.primary_muscle !== 'None') {
                ex.primary_muscle.split(',').forEach(m => {
                    const n = normalizeMuscle(m.trim());
                    if (n) muscles.add(n);
                });
            }
            if (ex.secondary_muscle && ex.secondary_muscle !== 'None') {
                ex.secondary_muscle.split(',').forEach(m => {
                    const n = normalizeMuscle(m.trim());
                    if (n) muscles.add(n);
                });
            }
            return Array.from(muscles);
        }

        function buildGraphData(exercises) {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const maxRadius = Math.min(centerX, centerY) * 0.9;
            const minRadius = 50; // Минимальный радиус для центра

            // Собираем все уникальные группы мышц для углов
            const allMuscleNames = [...new Set(exercises.flatMap(ex => getAllMuscles(ex)))].sort();
            const muscleAngle = {};
            allMuscleNames.forEach((m, i) => {
                muscleAngle[m] = (2 * Math.PI * i) / allMuscleNames.length;
            });

            // Определяем максимальное количество мышц
            const maxMuscles = Math.max(...exercises.map(ex => getAllMuscles(ex).length), 1);

            // Группируем упражнения по количеству мышц для равномерного распределения
            const byMuscleCount = {};
            exercises.forEach((ex, i) => {
                const count = getAllMuscles(ex).length;
                if (!byMuscleCount[count]) byMuscleCount[count] = [];
                byMuscleCount[count].push({ ex, i });
            });

            const nodes = [];

            // Создаём узлы с позициями на концентрических кругах
            Object.entries(byMuscleCount).forEach(([countStr, exList]) => {
                const count = parseInt(countStr);
                // Радиус: больше мышц = ближе к центру
                const radius = minRadius + (maxRadius - minRadius) * (1 - (count - 1) / Math.max(maxMuscles - 1, 1));

                // Распределяем равномерно по кругу на этом радиусе
                exList.forEach(({ ex, i }, idx) => {
                    const muscles = getAllMuscles(ex);
                    const primaryMuscle = getPrimaryMuscle(ex);

                    // Базовый угол от primary мышцы + сдвиг внутри секции
                    const baseAngle = muscleAngle[primaryMuscle] || 0;
                    const sectorWidth = (2 * Math.PI) / allMuscleNames.length;
                    const offsetInSector = (Math.random() - 0.5) * sectorWidth * 0.8;
                    const angle = baseAngle + offsetInSector;

                    nodes.push({
                        id: i,
                        name: ex.name,
                        equipment: ex.equipment,
                        primary_muscle: ex.primary_muscle,
                        secondary_muscle: ex.secondary_muscle,
                        video: ex.video,
                        thumbnail: ex.thumbnail,
                        primaryGroup: primaryMuscle,
                        allMuscles: muscles,
                        muscleCount: count,
                        color: getMuscleColor(primaryMuscle),
                        x: centerX + radius * Math.cos(angle),
                        y: centerY + radius * Math.sin(angle)
                    });
                });
            });

            // Связи между упражнениями с общими мышцами (ограничено)
            const links = [];
            const nodeLinks = {};
            const maxLinksPerNode = 5;

            // Группируем по primary muscle для связей внутри группы
            const byPrimaryMuscle = {};
            nodes.forEach(node => {
                if (!byPrimaryMuscle[node.primaryGroup]) byPrimaryMuscle[node.primaryGroup] = [];
                byPrimaryMuscle[node.primaryGroup].push(node);
            });

            // Связываем упражнения внутри одной группы мышц (соседние по радиусу)
            Object.values(byPrimaryMuscle).forEach(group => {
                // Сортируем по количеству мышц
                group.sort((a, b) => a.muscleCount - b.muscleCount);

                for (let i = 0; i < group.length - 1; i++) {
                    const srcCount = nodeLinks[group[i].id] || 0;
                    const tgtCount = nodeLinks[group[i + 1].id] || 0;

                    if (srcCount < maxLinksPerNode && tgtCount < maxLinksPerNode) {
                        links.push({
                            source: group[i].id,
                            target: group[i + 1].id,
                            color: group[i].color,
                            muscle: group[i].primaryGroup,
                            strength: 0.5
                        });
                        nodeLinks[group[i].id] = srcCount + 1;
                        nodeLinks[group[i + 1].id] = tgtCount + 1;
                    }
                }
            });

            // Группировка для легенды
            const muscleGroups = {};
            nodes.forEach(node => {
                node.allMuscles.forEach(muscle => {
                    if (!muscleGroups[muscle]) muscleGroups[muscle] = [];
                    muscleGroups[muscle].push(node.id);
                });
            });

            return { nodes, links, muscleGroups };
        }

        let Graph;
        let allExercises = [];
        let currentFilter = null;
        let searchQuery = ''; // Для поиска с кастомным рендером

        function createLegend(muscleGroups) {
            const legendItems = document.getElementById('legend-items');
            legendItems.innerHTML = '';

            const sorted = Object.entries(muscleGroups).sort((a, b) => b[1].length - a[1].length);
            sorted.forEach(([muscle, group]) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background: ${getMuscleColor(muscle)}"></div>
                    <span class="legend-text">${muscle}</span>
                    <span class="legend-count">${group.length}</span>
                `;
                item.addEventListener('click', () => {
                    document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
                    if (currentFilter === muscle) {
                        currentFilter = null;
                        Graph.nodeColor(node => node.color);
                        Graph.linkColor(link => link.color + '40');
                    } else {
                        currentFilter = muscle;
                        item.classList.add('active');
                        Graph.nodeColor(node => node.allMuscles.includes(muscle) ? node.color : '#222');
                        Graph.linkColor(link => link.muscle === muscle ? link.color + 'AA' : '#111');
                    }
                });
                legendItems.appendChild(item);
            });
        }

        function showTooltip(node) {
            const tooltip = document.getElementById('tooltip');
            let musclesHtml = '';
            node.allMuscles.forEach(m => {
                musclesHtml += `<span class="muscle-badge" style="background:${getMuscleColor(m)}">${m}</span>`;
            });

            let mediaHtml = '';
            if (node.video && node.video !== 'None') {
                mediaHtml = `<video autoplay loop muted playsinline><source src="${node.video}" type="video/mp4"></video>`;
            } else if (node.thumbnail && node.thumbnail !== 'None') {
                mediaHtml = `<img src="${node.thumbnail}" onerror="this.style.display='none'">`;
            }

            tooltip.innerHTML = `
                <h4>${node.name}</h4>
                ${node.equipment && node.equipment !== 'None' ? `<div class="equipment">🏋️ ${node.equipment}</div>` : ''}
                <div class="muscles">${musclesHtml}</div>
                ${mediaHtml}
            `;

            // Получаем позицию мыши из глобального события
            const rect = document.getElementById('graph').getBoundingClientRect();
            let x = (node.x || 0) + rect.width / 2 + 20;
            let y = (node.y || 0) + rect.height / 2 - 20;

            // Ограничиваем позицию экраном
            if (x + 350 > window.innerWidth) x = window.innerWidth - 360;
            if (y + 300 > window.innerHeight) y = window.innerHeight - 310;
            if (x < 10) x = 10;
            if (y < 10) y = 10;

            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
            tooltip.style.display = 'block';
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }

        function redrawGraph() {
            const bodyweightOnly = document.getElementById('bodyweight-only').checked;
            const videoOnly = document.getElementById('video-only').checked;
            const filtered = filterExercises(allExercises, bodyweightOnly, videoOnly);

            document.getElementById('exercise-count').textContent = `🏋️ ${filtered.length} упражнений`;

            const { nodes, links, muscleGroups } = buildGraphData(filtered);
            createLegend(muscleGroups);

            if (Graph) {
                Graph.graphData({ nodes, links });
            } else {
                const NODE_R = 18; // Радиус узла

                Graph = ForceGraph()
                    (document.getElementById('graph'))
                    .graphData({ nodes, links })
                    .backgroundColor('#0f0c29')
                    .nodeLabel('')
                    .nodeRelSize(1)
                    .nodeVal(1)
                    .nodeCanvasObject((node, ctx, globalScale) => {
                        const r = NODE_R;
                        const isMatch = !searchQuery || node.name.toLowerCase().includes(searchQuery);

                        // Рисуем круг
                        ctx.beginPath();
                        ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);
                        ctx.fillStyle = isMatch ? node.color : '#333';
                        ctx.globalAlpha = isMatch ? 1 : 0.3;
                        ctx.fill();
                        ctx.globalAlpha = 1;

                        // Обводка
                        ctx.strokeStyle = isMatch ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.1)';
                        ctx.lineWidth = 1;
                        ctx.stroke();

                        // Текст
                        const label = node.name.split('(')[0].trim();
                        const fontSize = 6;
                        ctx.font = `${fontSize}px Sans-Serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = 'white';

                        // Многострочный текст
                        const maxWidth = r * 1.8;
                        const words = label.split(' ');
                        let lines = [];
                        let currentLine = '';

                        for (const word of words) {
                            const testLine = currentLine ? currentLine + ' ' + word : word;
                            if (ctx.measureText(testLine).width > maxWidth && currentLine) {
                                lines.push(currentLine);
                                currentLine = word;
                            } else {
                                currentLine = testLine;
                            }
                        }
                        if (currentLine) lines.push(currentLine);

                        if (lines.length > 2) {
                            lines = lines.slice(0, 2);
                            lines[1] = lines[1].substring(0, Math.max(0, lines[1].length - 2)) + '..';
                        }

                        const lineHeight = fontSize * 1.2;
                        const startY = node.y - (lines.length - 1) * lineHeight / 2;
                        lines.forEach((line, i) => {
                            ctx.fillText(line, node.x, startY + i * lineHeight);
                        });
                    })
                    .nodePointerAreaPaint((node, color, ctx) => {
                        ctx.beginPath();
                        ctx.arc(node.x, node.y, NODE_R, 0, 2 * Math.PI);
                        ctx.fillStyle = color;
                        ctx.fill();
                    })
                    .linkColor(link => link.color + '40')
                    .linkWidth(0.5)
                    .d3AlphaDecay(0.02)
                    .d3VelocityDecay(0.4)
                    .warmupTicks(100)
                    .cooldownTicks(200)
                    .d3Force('link', d3.forceLink().id(d => d.id).distance(40).strength(0.3))
                    .d3Force('charge', d3.forceManyBody().strength(-30))
                    .d3Force('center', d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2))
                    .d3Force('collision', d3.forceCollide().radius(NODE_R + 2))
                    .onNodeHover((node, prevNode) => {
                        document.body.style.cursor = node ? 'pointer' : 'default';
                    })
                    .onNodeClick((node, event) => {
                        if (node) showTooltip(node);
                    })
                    .onBackgroundClick(() => hideTooltip());
            }
        }

        // Поиск
        document.getElementById('search').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            if (Graph) {
                Graph.nodeColor(() => null); // Тригерим перерисовку
            }
        });

        // Инициализация
        async function init() {
            allExercises = await loadData();
            document.getElementById('loading').style.display = 'none';

            if (allExercises.length > 0) {
                redrawGraph();
                document.getElementById('bodyweight-only').addEventListener('change', () => { currentFilter = null; redrawGraph(); });
                document.getElementById('video-only').addEventListener('change', () => { currentFilter = null; redrawGraph(); });
            } else {
                document.body.innerHTML = '<div style="color:white;text-align:center;padding:50px">❌ Ошибка загрузки</div>';
            }
        }

        init();
    </script>
</body>

</html>
